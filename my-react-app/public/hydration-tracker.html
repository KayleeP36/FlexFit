<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexFit Hydration Tracker</title>
    <style>
      :root {
        --bg-0: #030303;
        --bg-1: #080b12;
        --card: rgba(255, 255, 255, 0.04);
        --line: rgba(31, 80, 200, 0.4);
        --text: #e0eaf4;
        --muted: #abb8c9;
        --hot-1: #0f2d6b;
        --hot-2: #2563b6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 5%, rgba(26, 90, 210, 0.12), transparent 40%),
          radial-gradient(circle at 95% 0%, rgba(15, 45, 160, 0.12), transparent 35%),
          linear-gradient(130deg, #030303, #080808);
        padding: 16px;
      }

      .panel {
        width: min(460px, 96vw);
        border-radius: 22px;
        padding: 24px;
        border: 1px solid var(--line);
        background: linear-gradient(160deg, rgba(20, 20, 20, 0.96), rgba(14, 14, 14, 0.92));
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }

      .back-btn {
        border: 1px solid rgba(65, 155, 255, 0.45);
        border-radius: 10px;
        background: #101622;
        color: #d1e2ff;
        font-size: 0.9rem;
        font-weight: 700;
        padding: 8px 12px;
        cursor: pointer;
      }

      .back-btn:hover {
        filter: brightness(1.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.9rem, 4vw, 2.4rem);
        line-height: 1;
        text-transform: uppercase;
        color: #eef4ff;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .counter-row {
        margin-top: 20px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 12px;
        align-items: center;
      }

      .btn {
        border: 1px solid rgba(65, 155, 255, 0.45);
        border-radius: 10px;
        background: #101622;
        color: #d1e2ff;
        font-size: 1.4rem;
        font-weight: 700;
        height: 46px;
        cursor: pointer;
        transition: transform 140ms ease, filter 140ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.08);
      }

      .btn.plus {
        background: linear-gradient(120deg, var(--hot-1), var(--hot-2));
        color: #0e1622;
        border: 0;
      }

      .count {
        font-size: 2.1rem;
        font-weight: 800;
        text-align: center;
      }

      .goal {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(30, 80, 200, 0.34);
        background: var(--card);
      }

      .goal strong {
        color: #eaf2ff;
      }

      .meter-wrap {
        margin-top: 18px;
      }

      .meter-title {
        margin-bottom: 8px;
        color: #d8e6f8;
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .meter {
        width: 100%;
        height: 14px;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid rgba(30, 80, 200, 0.36);
        background: rgba(255, 255, 255, 0.06);
      }

      .meter-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--hot-1), var(--hot-2));
        transition: width 180ms ease;
      }

      .cups {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 8px;
      }

      .cup {
        height: 30px;
        border-radius: 7px;
        border: 1px solid rgba(30, 80, 200, 0.38);
        background: rgba(255, 255, 255, 0.04);
        transition: transform 150ms ease, background 150ms ease;
      }

      .cup.active {
        background: linear-gradient(160deg, rgba(15, 45, 107, 0.92), rgba(37, 99, 188, 0.85));
        transform: translateY(-2px);
      }

      .hint {
        margin-top: 12px;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <section class="panel" aria-label="Hydration tracker">
      <div class="top-row">
        <h1>Hydration Tracker</h1>
        <button class="back-btn" id="backBtn" type="button">Back</button>
      </div>
      <p>Recommended water intake: <strong id="recommended">8 cups</strong></p>

      <div class="counter-row">
        <button class="btn" id="minusBtn" type="button" aria-label="Decrease cups">-1</button>
        <div class="count"><span id="count">0</span> / 8</div>
        <button class="btn plus" id="plusBtn" type="button" aria-label="Increase cups">+1</button>
      </div>

      <div class="goal">
        <span>Today: <strong id="summary">0 cups logged</strong></span>
      </div>

      <div class="meter-wrap">
        <div class="meter-title">Daily Progress</div>
        <div class="meter" role="progressbar" aria-valuemin="0" aria-valuemax="8" aria-valuenow="0">
          <div class="meter-fill" id="meterFill"></div>
        </div>
        <div class="cups" id="cupsTrack" aria-hidden="true"></div>
      </div>

      <p class="hint" id="hint">Let's get hydrated. Start with your first cup.</p>
    </section>

    <script>
      const recommendedCups = 8
      const initialStoredCups = Number(localStorage.getItem('hydrationCups') ?? 0)
      let currentCups = Number.isFinite(initialStoredCups)
        ? Math.min(recommendedCups, Math.max(0, initialStoredCups))
        : 0

      const countEl = document.getElementById('count')
      const summaryEl = document.getElementById('summary')
      const meterFillEl = document.getElementById('meterFill')
      const hintEl = document.getElementById('hint')
      const cupsTrackEl = document.getElementById('cupsTrack')
      const meterEl = document.querySelector('[role="progressbar"]')

      for (let i = 0; i < recommendedCups; i += 1) {
        const cup = document.createElement('div')
        cup.className = 'cup'
        cupsTrackEl.appendChild(cup)
      }

      function updateUi() {
        localStorage.setItem('hydrationCups', String(currentCups))

        countEl.textContent = currentCups
        summaryEl.textContent = `${currentCups} cup${currentCups === 1 ? '' : 's'} logged`

        const progress = Math.min(100, (currentCups / recommendedCups) * 100)
        meterFillEl.style.width = `${progress}%`
        meterEl.setAttribute('aria-valuenow', String(currentCups))

        const cupBlocks = cupsTrackEl.children
        for (let i = 0; i < cupBlocks.length; i += 1) {
          cupBlocks[i].classList.toggle('active', i < currentCups)
        }

        if (currentCups === 0) {
          hintEl.textContent = "Let's get hydrated. Start with your first cup."
        } else if (currentCups < recommendedCups) {
          hintEl.textContent = `${recommendedCups - currentCups} more cup${recommendedCups - currentCups === 1 ? '' : 's'} to hit your goal.`
        } else {
          hintEl.textContent = 'Goal reached. Great recovery discipline!'
        }
      }

      document.getElementById('plusBtn').addEventListener('click', () => {
        currentCups = Math.min(recommendedCups, currentCups + 1)
        updateUi()
      })

      document.getElementById('minusBtn').addEventListener('click', () => {
        currentCups = Math.max(0, currentCups - 1)
        updateUi()
      })

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.assign('/')
      })

      updateUi()
    </script>
  </body>
</html>
